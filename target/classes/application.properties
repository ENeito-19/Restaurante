spring.application.name=Restaurante
server.address=0.0.0.0
server.port=${PORT:8081}

# Database Configuration - Production ready
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:restaurantedb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=${THEMELEAF_CACHE:true}

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
server.servlet.session.timeout=30m
spring.main.allow-circular-references=true
