<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ofertas')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="bg-dark text-white p-4 rounded-4 shadow-sm">
                    <h2 class="mb-1"><i class="bi bi-tag-fill me-2 text-danger"></i>Ofertas Especiales</h2>
                    <p class="mb-0 text-light">Aprovecha nuestros descuentos</p>
                </div>
            </div>
        </div>
        
        <div class="row g-4">
            <div th:if="${ofertas == null or ofertas.isEmpty()}" class="col-12">
                <div class="alert alert-info text-center">
                    <i class="bi bi-info-circle me-2"></i>No hay ofertas activas en este momento
                </div>
            </div>
            <div th:each="oferta : ${ofertas}" class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <img th:src="${oferta.imagen != null ? oferta.imagen : 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&h=250&fit=crop'}" 
                         th:alt="${oferta.titulo}" 
                         class="card-img-top" 
                         style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <div class="badge bg-danger mb-2">
                            <i class="bi bi-percent me-1"></i>
                            <span th:text="${oferta.descuento}">0</span>% OFF
                        </div>
                        <h5 class="card-title fw-bold" th:text="${oferta.titulo}">Oferta</h5>
                        <p class="card-text text-muted" th:text="${oferta.descripcion}">Descripción</p>
                        <div class="mt-3">
                            <span class="text-decoration-line-through text-muted">Q<span th:text="${oferta.precioOriginal}">0.00</span></span>
                            <span class="h4 text-danger ms-2">Q<span th:text="${oferta.precioOferta}">0.00</span></span>
                        </div>
                        <div class="mt-3" th:if="${oferta.fechaFin != null}">
                            <small class="text-muted">
                                <i class="bi bi-clock me-1"></i>Válido hasta: <span th:text="${#temporals.format(oferta.fechaFin, 'dd/MM/yyyy')}">Fecha</span>
                            </small>
                        </div>
                        <button class="btn btn-danger mt-3 w-100">
                            <i class="bi bi-cart-plus me-2"></i>Agregar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
