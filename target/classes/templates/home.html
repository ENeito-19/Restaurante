<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Inicio')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container py-5">
        <!-- Hero Section -->
        <div class="row mb-5">
            <div class="col-12">
                <div class="position-relative rounded-4 overflow-hidden shadow-sm">
                    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&h=400&fit=crop" 
                         alt="La Cocina de Hector" 
                         class="w-100" 
                         style="object-fit: cover; height: 400px;">
                    <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" 
                         style="background: rgba(0,0,0,0.5);">
                        <div class="text-center text-white">
                            <h1 class="display-4 fw-bold">Bienvenido a La Cocina de Hector</h1>
                            <p class="lead mt-3">Descubre los mejores platillos y bebidas</p>
                            <p class="fs-4 mt-2 text-warning">"Donde cada platillo cuenta la historia de Hector"</p>
                            <div class="mt-4">
                                <a th:href="@{/menu}" class="btn btn-danger btn-lg me-2">
                                    <i class="bi bi-list me-2"></i>Ver Menú
                                </a>
                                <a th:href="@{/ofertas}" class="btn btn-outline-light btn-lg">
                                    <i class="bi bi-tag me-2"></i>Ofertas
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Ofertas Destacadas -->
        <div class="row mb-5" th:if="${ofertas != null and !ofertas.isEmpty()}">
            <div class="col-12">
                <h2 class="mb-4 text-center">
                    <i class="bi bi-tag-fill text-danger me-2"></i>Ofertas Especiales
                </h2>
            </div>
            <div th:each="oferta : ${ofertas}" class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm h-100">
                    <img th:src="${oferta.imagen != null ? oferta.imagen : 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&h=250&fit=crop'}" 
                         th:alt="${oferta.titulo}" 
                         class="card-img-top" 
                         style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <div class="badge bg-danger mb-2">
                            <i class="bi bi-percent me-1"></i>
                            <span th:text="${oferta.descuento}">0</span>% OFF
                        </div>
                        <h5 class="card-title fw-bold" th:text="${oferta.titulo}">Oferta</h5>
                        <p class="card-text text-muted" th:text="${oferta.descripcion}">Descripción</p>
                        <div class="mt-3">
                            <span class="text-decoration-line-through text-muted">Q<span th:text="${oferta.precioOriginal}">0.00</span></span>
                            <span class="h4 text-danger ms-2">Q<span th:text="${oferta.precioOferta}">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Platillos Destacados -->
        <div class="row" th:if="${destacados != null and !destacados.isEmpty()}">
            <div class="col-12">
                <h2 class="mb-4 text-center">
                    <i class="bi bi-star-fill text-warning me-2"></i>Platillos Destacados
                </h2>
            </div>
            <div th:each="producto : ${destacados}" class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm h-100">
                    <img th:src="${producto.imagen != null ? producto.imagen : 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&h=250&fit=crop'}" 
                         th:alt="${producto.nombre}" 
                         class="card-img-top" 
                         style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title fw-bold" th:text="${producto.nombre}">Producto</h5>
                        <p class="card-text text-muted" th:text="${producto.descripcion}">Descripción</p>
                        <div class="mt-3">
                            <span class="h4 text-danger">Q<span th:text="${producto.precio}">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
