<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Menú')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="bg-dark text-white p-4 rounded-4 shadow-sm">
                    <h2 class="mb-1" th:text="'Categorías de ' + ${tipo}">Categorías</h2>
                    <p class="mb-0 text-light">Explora nuestras opciones</p>
                </div>
            </div>
        </div>
        
        <div class="row g-4">
            <div th:each="categoria : ${categorias}" class="col-md-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title fw-bold" th:text="${categoria.nombre}">Categoría</h4>
                        <p class="card-text text-muted" th:text="${categoria.descripcion}">Descripción</p>
                        <a th:href="@{/menu/categoria/{id}(id=${categoria.id})}" class="btn btn-danger mt-3">
                            <i class="bi bi-eye me-2"></i>Ver Productos
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
