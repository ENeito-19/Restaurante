<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="bg-dark text-white p-4 rounded-4 shadow-sm">
                    <div class="d-flex align-items-center">
                        <div class="bg-danger rounded-circle p-3 me-3">
                            <i class="bi bi-person-circle fs-1"></i>
                        </div>
                        <div>
                            <h2 class="mb-1">¡Hola, <span th:text="${usuario != null ? usuario.nombre : 'Usuario'}">Usuario</span>!</h2>
                            <p class="mb-0 text-light">Bienvenido a tu panel de restaurante</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center">
                        <div class="text-danger mb-2"><i class="bi bi-list fs-1"></i></div>
                        <h4 class="card-title">Menú</h4>
                        <p class="text-muted">Explora nuestro menú completo</p>
                        <a th:href="@{/menu}" class="btn btn-outline-danger btn-sm">Ver Menú</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center">
                        <div class="text-success mb-2"><i class="bi bi-tag fs-1"></i></div>
                        <h4 class="card-title">Ofertas</h4>
                        <p class="text-muted">Descubre ofertas especiales</p>
                        <a th:href="@{/ofertas}" class="btn btn-outline-danger btn-sm">Ver Ofertas</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body text-center">
                        <div class="text-warning mb-2"><i class="bi bi-cup-straw fs-1"></i></div>
                        <h4 class="card-title">Bebidas</h4>
                        <p class="text-muted">Bebidas refrescantes</p>
                        <a th:href="@{/bebidas}" class="btn btn-outline-danger btn-sm">Ver Bebidas</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
