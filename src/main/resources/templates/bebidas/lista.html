<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bebidas')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="bg-dark text-white p-4 rounded-4 shadow-sm">
                    <h2 class="mb-1"><i class="bi bi-cup-straw me-2 text-danger"></i>Nuestras Bebidas</h2>
                    <p class="mb-0 text-light">Refrescantes y deliciosas</p>
                </div>
            </div>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&h=200&fit=crop" 
                         alt="Café" 
                         class="card-img-top" 
                         style="height: 150px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Café</h5>
                        <p class="text-muted small">Café de Antigua</p>
                        <a th:href="@{/bebidas/cafe}" class="btn btn-outline-danger btn-sm w-100 mt-2">Ver</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <img src="https://images.unsplash.com/photo-1623065422902-30a2d299bbe4?w=400&h=200&fit=crop" 
                         alt="Jugos" 
                         class="card-img-top" 
                         style="height: 150px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Atoles</h5>
                        <p class="text-muted small">Atol de Elote, Arroz</p>
                        <a th:href="@{/bebidas/jugo}" class="btn btn-outline-danger btn-sm w-100 mt-2">Ver</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&h=200&fit=crop" 
                         alt="Gaseosas" 
                         class="card-img-top" 
                         style="height: 150px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Gaseosas</h5>
                        <a th:href="@{/bebidas/gaseosa}" class="btn btn-outline-danger btn-sm w-100 mt-2">Ver</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <img src="https://images.unsplash.com/photo-1566417713940-fe7c737a9ef2?w=400&h=200&fit=crop" 
                         alt="Alcohol" 
                         class="card-img-top" 
                         style="height: 150px; object-fit: cover;">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Alcohol</h5>
                        <p class="text-muted small">Gallo, Zacapa, Boj</p>
                        <a th:href="@{/bebidas/alcohol}" class="btn btn-outline-danger btn-sm w-100 mt-2">Ver</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row g-4">
            <div th:each="bebida : ${bebidas}" class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <img th:src="${bebida.imagen != null ? bebida.imagen : 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=400&h=250&fit=crop'}" 
                         th:alt="${bebida.nombre}" 
                         class="card-img-top" 
                         style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title fw-bold" th:text="${bebida.nombre}">Bebida</h5>
                        <p class="card-text text-muted" th:text="${bebida.descripcion}">Descripción</p>
                        <div class="mt-3">
                            <span class="h4 text-danger">Q<span th:text="${bebida.precio}">0.00</span></span>
                        </div>
                        <button class="btn btn-outline-danger mt-3 w-100">
                            <i class="bi bi-cart-plus me-2"></i>Agregar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
