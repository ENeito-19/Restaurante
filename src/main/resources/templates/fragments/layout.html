<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title th:text="${title} + ' - Restaurante'">Restaurante</title>
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tu-dominio.com/">
    <meta property="og:title" content="Restaurante - Menú, Ofertas y Bebidas">
    <meta property="og:description" content="Descubre nuestros deliciosos desayunos, almuerzos, cenas y bebidas. Ofertas especiales todos los días.">
    <meta property="og:image" content="https://tu-dominio.com/images/og-image.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tu-dominio.com/">
    <meta property="twitter:title" content="Restaurante - Menú, Ofertas y Bebidas">
    <meta property="twitter:description" content="Descubre nuestros deliciosos desayunos, almuerzos, cenas y bebidas.">
    <meta property="twitter:image" content="https://tu-dominio.com/images/og-image.jpg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-cup-hot me-2"></i>La Cocina de Hector
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-house me-1"></i>Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/menu}">
                            <i class="bi bi-list me-1"></i>Menú
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/bebidas}">
                            <i class="bi bi-cup-straw me-1"></i>Bebidas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ofertas}">
                            <i class="bi bi-tag me-1"></i>Ofertas
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav" sec:authorize="isAnonymous()">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/register}">
                            <i class="bi bi-person-plus me-1"></i>Registro
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-person-circle me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 La Cocina de Hector. Deliciosos platillos y bebidas.</p>
            <small class="text-muted">Creador: Hector Navarro - Creado en 2026</small>
        </div>
    </footer>

    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
